<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <link rel="stylesheet" href="pyscript.css" />
    <script type="module" src="pyscript.js"></script>
    
    <style>
        body {
            width: 320px;
            min-height: 420px;
            background-color: #f4ebe1; 
            font-family: "Courier New", Courier, monospace; 
            font-weight: bold;
            padding: 15px;
            margin: 0;
            color: #5c3a21; 
        }

        h3 {
            text-align: center;
            color: #d36135; 
            margin-top: 0;
            font-size: 22px;
            text-shadow: 2px 2px 0px #bd532b;
            letter-spacing: 1px;
            border-bottom: 4px double #d36135;
            padding-bottom: 5px;
        }

        .input-row {
            display: flex;
            gap: 6px;
            margin-bottom: 15px;
        }

        input[type="text"] { 
            flex: 1; 
            padding: 8px; 
            background-color: #fffdfa;
            border: 3px solid #5c3a21; 
            color: #5c3a21;
            font-family: inherit;
            font-weight: bold;
            outline: none;
        }
        
        button { 
            padding: 6px 12px; 
            background: #e0895d; 
            color: white; 
            border: 3px solid #5c3a21;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer; 
            box-shadow: 2px 2px 0px #5c3a21;
        }
        
        button:active { 
            transform: translate(2px, 2px);
            box-shadow: 0px 0px 0px #5c3a21;
        }

        #add-btn {
            background-color: #87a96b; 
        }

        ul { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
        }

        li { 
            display: flex; 
            align-items: center; 
            padding: 8px; 
            background: #ebdccb; 
            border: 3px solid #5c3a21;
            margin-bottom: 6px;
            box-shadow: 2px 2px 0px #5c3a21;
        }

        .todo-checkbox {
            width: 18px;
            height: 18px;
            accent-color: #87a96b;
            cursor: pointer;
            margin-right: 8px;
        }

        .task-text {
            flex: 1;
            word-break: break-all;
            padding-right: 4px;
        }

        li.completed .task-text {
            text-decoration: line-through;
            color: #a08068;
            opacity: 0.7;
        }

        .actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .priority-btn {
            padding: 2px 6px;
            font-size: 11px;
            box-shadow: 1px 1px 0px #5c3a21;
        }
        .p-0 { background-color: #dfba73; color: #5c3a21; } 
        .p-1 { background-color: #e0895d; color: white; }    
        .p-2 { background-color: #cd4a4a; color: white; }   

        .delete-btn { 
            background: #a64b2a; 
            padding: 2px 6px; 
            font-size: 11px; 
            box-shadow: 1px 1px 0px #5c3a21;
        }
    </style>
</head>

<body>
    <h3> TO-DO LIST </h3>
    <div class="input-row">
        <input id="task-input" type="text" placeholder="What do you want to do today?">
        <button id="add-btn" py-click="add_task">Add</button>
    </div> 
    
    <ul id="task-list"></ul>

    <script type="py" src="app.py"></script>
</body>
</html>
