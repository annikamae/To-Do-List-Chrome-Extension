<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>To-Do List</title>
    <!-- Load PyScript Core Assets -->
    <link rel="stylesheet" href="https://pyscript.net">
    <script type="module" src="https://pyscript.net"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&display=swap" rel="stylesheet">
    <style>
        body {
            width: 300px;
            height: 400px;
            font-family: sans-serif;
            padding: 10px;
            margin: 0;
        }

        h3 {
            font-family: "Pixelify Sans", sans-serif;
            font-weight: 700;
            text-align: center;
            top:0;
            color:rgba(40, 30, 30, 0.929);
        }

        .input-row {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;;
        }

        input { 
            flex: 1; 
            padding: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
        }
        
        button { 
            padding: 8px 12px; 
            background: #007bff; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
        }
        
        button:hover { 
            background: #0056b3; 
        }

        ul { 
            list-style: none; 
            padding: 0; 
            margin: 0; 
        }

        li { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 8px; 
            border-bottom: 1px solid #eee; 
        }

        .delete-btn { 
            background: #dc3545; 
            padding: 4px 8px; 
            font-size: 12px; 
        }
        
        .delete-btn:hover { 
            background: #bd2130; 
        }
    </style>
</head>

<body>
    <h3>To-Do List</h3>
    <div class="input-row">
        <input id="task" input="text" placeholder="What do you want to do today?">
        <button id="add" py-click="Add task">Add</button>
    </div> 
    <ul id="task-list">
        <script type="py" src="app.py" config='{"interpreter": "https://jsdelivr.net"}'></script>
    </ul>
</body>
</html>
